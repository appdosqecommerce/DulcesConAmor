<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Dulces Pro</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f6f8;
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#ff4d4d;
  border:none;
  padding:8px 14px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns: 1fr 380px;
  gap:20px;
  padding:20px;
}

/* BUSCADOR */
.search{
  margin-bottom:10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-top:5px;
}

.activo{background:#d4f8e8;color:#008a4e}
.inactivo{background:#ffd6d6;color:#c10000}

.actions{
  margin-top:10px;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.edit{background:#007bff;color:white}
.delete{background:#ff4d4d;color:white}
.toggle{background:#ffc107;color:black}

/* FORM */
.form{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
  position:sticky;
  top:20px;
}

label{font-size:13px;color:#555}

input, select{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border-radius:8px;
  border:1px solid #ddd;
}

.save{
  width:100%;
  padding:12px;
  background:#00c851;
  color:white;
  font-weight:bold;
  border-radius:8px;
}

#preview{
  width:100%;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <h2>Admin Dulces 🍓</h2>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">

<!-- IZQUIERDA -->
<div>

<div class="search">
  <input id="buscador" placeholder="Buscar producto...">
</div>

<div id="lista"></div>

</div>

<!-- FORM -->
<div class="form">

<h3>Producto</h3>

<label>Nombre</label>
<input id="nombre">

<label>Precio</label>
<input id="precio">

<label>Categoría</label>
<select id="categoria">
  <option value="desayuno">Desayuno</option>
  <option value="romantico">Romántico</option>
  <option value="cumpleanos">Cumpleaños</option>
  <option value="flores">Flores</option>
  <option value="cerveza">Cervezas</option>
  <option value="vino">Vinos</option>
</select>

<label>Imagen</label>
<input type="file" id="imagenFile">
<img id="preview">

<label>Estado</label>
<select id="activo">
  <option value="true">Activo</option>
  <option value="false">Inactivo</option>
</select>

<button class="save" onclick="guardar()">Guardar producto</button>

</div>

</div>

<script type="module">

import { db, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "./js/firebase.js";
import { storage, ref, uploadBytes, getDownloadURL } from "./js/firebase.js";
import "./js/auth.js";

window.proteger();

let productos = [];
let editId = null;

// PREVIEW
const inputFile = document.getElementById("imagenFile");
const preview = document.getElementById("preview");

inputFile.addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// CARGAR
async function cargar(){
  const snap = await getDocs(collection(db,"productos"));
  productos = [];
  snap.forEach(d=>productos.push({id:d.id,...d.data()}));
  render();
}

cargar();

// BUSCADOR
document.getElementById("buscador").addEventListener("input", e=>{
  const t = e.target.value.toLowerCase();
  const filtrados = productos.filter(p=>p.nombre.toLowerCase().includes(t));
  render(filtrados);
});

// RENDER
function render(lista = productos){
  document.getElementById("lista").innerHTML = lista.map(p=>`
    <div class="card">
      <b>${p.nombre}</b><br>
      $${p.precio}<br>
      ${p.categoria || ""}<br>

      <span class="badge ${p.activo !== false ? "activo":"inactivo"}">
        ${p.activo !== false ? "Activo":"Inactivo"}
      </span>

      <div class="actions">
        <button class="edit" onclick="editar('${p.id}')">Editar</button>
        <button class="toggle" onclick="toggle('${p.id}')">Estado</button>
        <button class="delete" onclick="eliminar('${p.id}')">Eliminar</button>
      </div>
    </div>
  `).join("");
}

// EDITAR
window.editar = id=>{
  const p = productos.find(x=>x.id===id);
  editId=id;

  nombre.value=p.nombre;
  precio.value=p.precio;
  categoria.value=p.categoria||"desayuno";
  activo.value=p.activo!==false;

  if(p.imagen){
    preview.src=p.imagen;
    preview.style.display="block";
  }
};

// TOGGLE ACTIVO
window.toggle = async id=>{
  const p = productos.find(x=>x.id===id);
  await updateDoc(doc(db,"productos",id),{
    activo: p.activo===false
  });
  cargar();
};

// GUARDAR
window.guardar = async ()=>{
  let nombreV = nombre.value;
  let precioV = Number(precio.value);
  let categoriaV = categoria.value;
  let activoV = activo.value==="true";

  if(!nombreV || precioV<=0) return alert("Datos inválidos");

  let imagenURL="";
  const file = imagenFile.files[0];

  if(file){
    const ruta = ref(storage,"productos/"+Date.now()+"_"+file.name);
    await uploadBytes(ruta,file);
    imagenURL = await getDownloadURL(ruta);
  }

  if(!imagenURL && editId){
    imagenURL = productos.find(p=>p.id===editId).imagen;
  }

  const data = {
    nombre:nombreV,
    precio:precioV,
    categoria:categoriaV,
    activo:activoV,
    imagen:imagenURL
  };

  if(editId){
    await updateDoc(doc(db,"productos",editId),data);
  }else{
    await addDoc(collection(db,"productos"),data);
  }

  limpiar();
  cargar();
};

// ELIMINAR
window.eliminar = async id=>{
  if(confirm("Eliminar?")){
    await deleteDoc(doc(db,"productos",id));
    cargar();
  }
};

// LIMPIAR
function limpiar(){
  nombre.value="";
  precio.value="";
  categoria.value="desayuno";
  activo.value="true";
  imagenFile.value="";
  preview.style.display="none";
  editId=null;
}

</script>

</body>
</html>
