<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f6f8;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  color:#fff;
  padding:15px 25px;
}

.logout{
  background:#ff4d4d;
  color:white;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns: 1fr 360px;
  gap:20px;
  padding:20px;
}

/* LISTA */
.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.card b{font-size:16px}

.actions{
  margin-top:10px;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.edit{background:#007bff;color:white}
.delete{background:#ff4d4d;color:white}

/* FORM */
.form{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
  position:sticky;
  top:20px;
}

.form h3{
  margin-bottom:15px;
}

label{
  font-size:13px;
  color:#555;
}

input, select{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border-radius:8px;
  border:1px solid #ddd;
}

.save{
  width:100%;
  padding:12px;
  background:#00c851;
  color:white;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.save:hover{
  background:#00a844;
}

#preview{
  width:100%;
  border-radius:10px;
  margin-top:10px;
  display:none;
}
</style>

</head>
<body>

<div class="header">
  <h2>Panel de Productos 🔥</h2>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">

<!-- LISTA -->
<div id="lista"></div>

<!-- FORM -->
<div class="form">

<h3>Crear / Editar producto</h3>

<label>Nombre</label>
<input id="nombre">

<label>Precio</label>
<input id="precio">

<label>Categoría</label>
<select id="categoria">
  <option value="desayuno">Desayuno</option>
  <option value="romantico">Romántico</option>
  <option value="cumpleanos">Cumpleaños</option>
  <option value="flores">Flores</option>
  <option value="cerveza">Cervezas</option>
  <option value="vino">Vinos</option>
</select>

<label>Imagen</label>
<input type="file" id="imagenFile">
<img id="preview">

<label>Estado</label>
<select id="activo">
  <option value="true">Activo</option>
  <option value="false">Inactivo</option>
</select>

<button class="save" onclick="guardar()">Guardar producto</button>

</div>

</div>

<script type="module">

import { db, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "./js/firebase.js";
import { storage, ref, uploadBytes, getDownloadURL } from "./js/firebase.js";
import "./js/auth.js";

window.proteger();

let productos = [];
let editId = null;

// PREVIEW
const inputFile = document.getElementById("imagenFile");
const preview = document.getElementById("preview");

inputFile.addEventListener("change", function () {
  const file = this.files[0];

  if (file) {
    const reader = new FileReader();
    reader.onload = function (e) {
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

// CARGAR
async function cargar(){
  const snapshot = await getDocs(collection(db, "productos"));
  productos = [];

  snapshot.forEach(docu => {
    productos.push({ id: docu.id, ...docu.data() });
  });

  render();
}

cargar();

// RENDER
function render(){
  let html = "";

  productos.forEach(p=>{
    html += `
      <div class="card">
        <b>${p.nombre}</b><br>
        $${p.precio}<br>
        Categoría: ${p.categoria || "Sin categoría"}<br>
        Estado: ${p.activo !== false ? "Activo" : "Inactivo"}<br>

        <div class="actions">
          <button class="edit" onclick="editar('${p.id}')">Editar</button>
          <button class="delete" onclick="eliminar('${p.id}')">Eliminar</button>
        </div>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

// EDITAR
window.editar = function(id){
  const p = productos.find(x => x.id === id);
  editId = id;

  document.getElementById("nombre").value = p.nombre;
  document.getElementById("precio").value = p.precio;
  document.getElementById("categoria").value = p.categoria || "desayuno";
  document.getElementById("activo").value = p.activo !== false;

  if(p.imagen){
    preview.src = p.imagen;
    preview.style.display = "block";
  }
}

// GUARDAR
window.guardar = async function(){

  let nombre = document.getElementById("nombre").value;
  let precio = Number(document.getElementById("precio").value);
  let categoria = document.getElementById("categoria").value;
  let activo = document.getElementById("activo").value === "true";

  if(!nombre || isNaN(precio) || precio <= 0){
    alert("Precio inválido");
    return;
  }

  let imagenURL = "";
  const file = document.getElementById("imagenFile").files[0];

  if(file){
    const ruta = ref(storage, "productos/" + Date.now() + "_" + file.name);
    await uploadBytes(ruta, file);
    imagenURL = await getDownloadURL(ruta);
  }

  if(!imagenURL && editId){
    const actual = productos.find(p => p.id === editId);
    imagenURL = actual.imagen;
  }

  let producto = {
    nombre,
    precio,
    categoria,
    imagen: imagenURL,
    activo
  };

  if(editId){
    await updateDoc(doc(db, "productos", editId), producto);
    alert("✏️ Producto actualizado");
  } else {
    await addDoc(collection(db, "productos"), producto);
    alert("✅ Producto creado");
  }

  editId = null;
  limpiar();
  cargar();
}

// ELIMINAR
window.eliminar = async function(id){
  if(confirm("¿Eliminar producto?")){
    await deleteDoc(doc(db, "productos", id));
    alert("🗑️ Eliminado");
    cargar();
  }
}

// LIMPIAR
function limpiar(){
  document.getElementById("nombre").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("activo").value = "true";
  document.getElementById("categoria").value = "desayuno";
  document.getElementById("imagenFile").value = "";
  preview.style.display = "none";
}

</script>

</body>
</html>
