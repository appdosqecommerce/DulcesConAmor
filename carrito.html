<!-- SCRIPT DE PAGO Wompi -->
<script>
function pagarWompi() {

  // Tomar total del carrito (ajústalo si tu variable es diferente)
  let textoTotal = document.getElementById("total").innerText;

  // Extraer número (ej: "Total: $25.000")
  let total = textoTotal.replace(/[^0-9]/g, "");

  if (!total || total == 0) {
    alert("Tu carrito está vacío");
    return;
  }

  // Convertir a centavos
  let totalCentavos = parseInt(total) * 100;

  // URL de Wompi
  let url = `https://checkout.wompi.co/p/?public-key=TU_PUBLIC_KEY&currency=COP&amount-in-cents=${totalCentavos}&reference=pedido${Date.now()}`;

  window.location.href = url;
}
</script>
