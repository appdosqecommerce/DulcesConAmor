<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <link rel="icon" href="favicon.ico">
</head>
<body style="font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5">

  <div style="background:white;padding:30px;border-radius:10px;width:300px">
    <h2>🔐 Admin</h2>

    <input id="email" placeholder="Correo" style="width:100%;margin-bottom:10px;padding:10px">
    <input id="password" type="password" placeholder="Contraseña" style="width:100%;margin-bottom:10px;padding:10px">

    <button onclick="login()" style="width:100%;padding:10px;background:black;color:white">
      Ingresar
    </button>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
